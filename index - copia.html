<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi App Tecnológica</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<section class="seccion-media">
  <!-- Imagen Local -->
  <img src="imagenes/portada.jpg" alt="Imagen de mi proyecto" class="img-fluida">
  
  <!-- Video de YouTube (Opcional) -->
  <div class="video-contenedor">
    <iframe src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe>
  </div>
</section>
<body>

<div class="contenedor-app">
    <header class="mi-header">
        <h1>Panel de Control</h1>
    </header>
    
    <main class="contenido">
        <p>Selecciona una opción para continuar:</p>
        
        <div class="grid-servicios">
            <div class="card" id="btn-reportar">
                <span class="icon">⚠️</span>
                <h3>Reportar Fallo</h3>
            </div>
            
            <div class="card" id="btn-manual">
                <span class="icon">👓</span>
                <h3>Ver Manual</h3>
            </div>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
